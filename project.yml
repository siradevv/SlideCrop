name: SlideCrop
options:
  minimumXcodeGenVersion: 2.44.0
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
targets:
  SlideCrop:
    type: application
    platform: iOS
    deploymentTarget: 17.0
    sources:
      - path: SlideCrop/App
      - path: SlideCrop/Views
      - path: SlideCrop/Components
      - path: SlideCrop/Services
      - path: SlideCrop/Models
      - path: SlideCrop/ViewModels
      - path: SlideCrop/Resources/Assets.xcassets
        buildPhase: resources
      - path: SlideCrop/Resources/LaunchScreen.storyboard
        buildPhase: resources
      - path: SlideCrop/Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
      - path: SlideCrop/Resources/SlideCropProducts.storekit
        buildPhase: resources
    dependencies:
      - target: SlideCropShare
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.local.SlideCrop
        PRODUCT_NAME: SlideCrop
        INFOPLIST_FILE: SlideCrop/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 3
        MARKETING_VERSION: 3.0
        TARGETED_DEVICE_FAMILY: 1,2
    scheme:
      gatherCoverageData: false

  SlideCropShare:
    type: app-extension
    platform: iOS
    deploymentTarget: 17.0
    sources:
      - path: SlideCropShare
        excludes:
          - Resources
      - path: SlideCrop/Services/SlideCropService.swift
      - path: SlideCrop/Services/PhotoLibraryService.swift
      - path: SlideCrop/Services/HapticService.swift
      - path: SlideCrop/Models/ProcessedItem.swift
      - path: SlideCrop/Models/ProcessingSettings.swift
      - path: SlideCrop/Models/CropQuad.swift
      - path: SlideCrop/Models/SlideCropError.swift
      - path: SlideCrop/Components/PressScaleButtonStyle.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.local.SlideCrop.ShareExtension
        PRODUCT_NAME: SlideCropShare
        INFOPLIST_FILE: SlideCropShare/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 3
        MARKETING_VERSION: 3.0
        TARGETED_DEVICE_FAMILY: 1,2
        SKIP_INSTALL: true
        APPLICATION_EXTENSION_API_ONLY: true
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: APPEXTENSION
